<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="45%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1e3a6e"/>
      <stop offset="100%" stop-color="#04091a"/>
    </radialGradient>
    <radialGradient id="sun" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#e8a822"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark navy background, rounded corners -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Subtle inner glow at top -->
  <ellipse cx="14" cy="6" rx="9" ry="5" fill="#2563eb" opacity="0.12"/>

  <!-- Orbital ring — tilted like the logo swoosh -->
  <ellipse cx="16" cy="16.5" rx="11.5" ry="5.5"
    fill="none"
    stroke="#4fa8d8"
    stroke-width="1.4"
    stroke-dasharray="2.5 1.2"
    opacity="0.75"
    transform="rotate(-28 16 16.5)"/>

  <!-- Solid front arc (lower half, brighter) -->
  <path
    d="M 5.2 18.8 A 11.5 5.5 0 0 0 26.8 14.2"
    fill="none"
    stroke="#7dd3fc"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.6"
    transform="rotate(-28 16 16.5)"/>

  <!-- Center body — the sun/star -->
  <circle cx="16" cy="16" r="3.6" fill="url(#sun)" filter="url(#glow)"/>
  <circle cx="14.8" cy="14.8" r="1.1" fill="#fef9c3" opacity="0.55"/>

  <!-- Orange planet (top right, like the logo) -->
  <circle cx="25.8" cy="11.5" r="2.1" fill="#f97316" filter="url(#glow)"/>
  <circle cx="25.1" cy="10.8" r="0.7" fill="#fed7aa" opacity="0.6"/>

  <!-- Teal/green planet (lower left, like the logo) -->
  <circle cx="6.2" cy="21" r="1.6" fill="#22d3ee" filter="url(#glow)"/>

  <!-- Small red dot (top, like logo) -->
  <circle cx="19" cy="7.5" r="1.1" fill="#f87171" opacity="0.9"/>
</svg>
