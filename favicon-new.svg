<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <defs>
    <!-- Deep-space background -->
    <radialGradient id="bg" cx="42%" cy="38%" r="80%">
      <stop offset="0%"  stop-color="#1f3f72"/>
      <stop offset="55%" stop-color="#0a172f"/>
      <stop offset="100%" stop-color="#020615"/>
    </radialGradient>

    <!-- Bright sun core: hot white centre, amber body, deep orange edge -->
    <radialGradient id="sun" cx="40%" cy="38%" r="75%">
      <stop offset="0%"  stop-color="#fffbeb"/>
      <stop offset="35%" stop-color="#fde68a"/>
      <stop offset="70%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>

    <!--
      Ring gradients — each ring fades dark→bright→dark across the
      visible arc so it reads as a metallic ring catching the light,
      not a flat stroke.
    -->
    <linearGradient id="ringOuter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0b3a86" stop-opacity="0.6"/>
      <stop offset="25%"  stop-color="#3b82f6"/>
      <stop offset="50%"  stop-color="#a5f3fc"/>
      <stop offset="75%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#0b3a86" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="ringMiddle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a2a66" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0a2a66" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="ringInner" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#091f4d" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#091f4d" stop-opacity="0.5"/>
    </linearGradient>

    <!-- 3D planet shading -->
    <radialGradient id="pRed" cx="32%" cy="30%" r="72%">
      <stop offset="0%"  stop-color="#fff5f5"/>
      <stop offset="20%" stop-color="#fda4af"/>
      <stop offset="60%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <radialGradient id="pGreen" cx="32%" cy="30%" r="72%">
      <stop offset="0%"  stop-color="#f0fdf4"/>
      <stop offset="20%" stop-color="#86efac"/>
      <stop offset="60%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </radialGradient>
    <radialGradient id="pAmber" cx="32%" cy="30%" r="72%">
      <stop offset="0%"  stop-color="#fffbeb"/>
      <stop offset="20%" stop-color="#fcd34d"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <radialGradient id="pBlue" cx="32%" cy="30%" r="72%">
      <stop offset="0%"  stop-color="#eff6ff"/>
      <stop offset="20%" stop-color="#93c5fd"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>

    <!-- Sun glow halo -->
    <radialGradient id="sunHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fde68a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <!-- Planet glow filter -->
    <filter id="planetGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded space background -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Atmospheric edge rim -->
  <rect
    width="64" height="64" rx="13"
    fill="none"
    stroke="#67e8f9"
    stroke-width="0.5"
    opacity="0.18"
  />

  <!-- Star field -->
  <g fill="#dbeafe">
    <circle cx="9"  cy="6"  r="0.55" opacity="0.85"/>
    <circle cx="48" cy="5"  r="0.40" opacity="0.70"/>
    <circle cx="56" cy="11" r="0.35" opacity="0.60"/>
    <circle cx="42" cy="3"  r="0.30" opacity="0.55"/>
    <circle cx="4"  cy="36" r="0.45" opacity="0.70"/>
    <circle cx="58" cy="46" r="0.55" opacity="0.85"/>
    <circle cx="55" cy="58" r="0.40" opacity="0.65"/>
    <circle cx="14" cy="55" r="0.35" opacity="0.55"/>
    <circle cx="3"  cy="51" r="0.30" opacity="0.50"/>
    <circle cx="36" cy="58" r="0.40" opacity="0.60"/>
  </g>

  <!--
    Saturn-style concentric rings — three nested tilted ellipses
    sharing the same centre, rotated -15° so they read as orbits
    seen from a slight angle.
  -->
  <g transform="rotate(-15 32 32)" fill="none" stroke-linecap="round">
    <!-- Outer ring -->
    <ellipse cx="32" cy="32" rx="26" ry="7"   stroke="url(#ringOuter)"  stroke-width="2.0"/>
    <!-- Middle ring -->
    <ellipse cx="32" cy="32" rx="22" ry="5.5" stroke="url(#ringMiddle)" stroke-width="1.7" opacity="0.95"/>
    <!-- Inner ring -->
    <ellipse cx="32" cy="32" rx="18" ry="4.2" stroke="url(#ringInner)"  stroke-width="1.4" opacity="0.85"/>
  </g>

  <!--
    Sun glow halo behind the core — soft amber bloom that bleeds into
    the rings so the central star feels lit from inside.
  -->
  <circle cx="32" cy="32" r="16" fill="url(#sunHalo)"/>

  <!-- Sun core -->
  <circle cx="32" cy="32" r="4.2" fill="url(#sun)"/>
  <!-- Sun specular highlight -->
  <circle cx="30.6" cy="30.6" r="1.1" fill="#ffffff" opacity="0.85"/>

  <!--
    Planet dots distributed along the rings (positions taken from
    variant B). Each is gradient-shaded for a 3D look + tiny white
    specular highlight.
  -->
  <g filter="url(#planetGlow)">
    <!-- Red — upper-right of outer ring -->
    <circle cx="48" cy="14" r="2.8" fill="url(#pRed)"/>
    <circle cx="47" cy="13" r="0.85" fill="#ffffff" opacity="0.75"/>

    <!-- Green — far right tip of outer ring -->
    <circle cx="58" cy="36" r="2.6" fill="url(#pGreen)"/>
    <circle cx="57" cy="35" r="0.8" fill="#ffffff" opacity="0.75"/>

    <!-- Amber accent — small inner-ring marker -->
    <circle cx="14" cy="20" r="1.6" fill="url(#pAmber)"/>
    <circle cx="13.5" cy="19.5" r="0.5" fill="#ffffff" opacity="0.75"/>

    <!-- Blue — lower-left of outer ring -->
    <circle cx="10" cy="44" r="2.6" fill="url(#pBlue)"/>
    <circle cx="9.1" cy="43.1" r="0.8" fill="#ffffff" opacity="0.75"/>
  </g>
</svg>
